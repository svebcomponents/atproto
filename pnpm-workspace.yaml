packages:
  - apps/*
  - components/*
  - packages/*
  - configs/*
# TEMPORARY: consume the local svebcomponents *hydration worktree* (contains
# the released #103 fixes AND the pending hydratable-custom-elements PR #105).
# The main ../svebcomponents checkout may sit on unrelated branches, so we
# link the worktree for reproducible dist output. Drop these overrides (and
# the cast in apps/web/vite.config.ts) once PR #105 is released to npm.
overrides:
  "@svebcomponents/ssr": "link:../svebcomponents-hydration/packages/ssr"
  "@svebcomponents/build": "link:../svebcomponents-hydration/packages/build"
  "@svebcomponents/auto-options": "link:../svebcomponents-hydration/packages/auto-options"
  "@svebcomponents/utils": "link:../svebcomponents-hydration/packages/utils"
catalog:
  "@svebcomponents/build": 0.0.9
  "@svebcomponents/ssr": 0.0.8
  "@svebcomponents/utils": 0.0.3
  "@sveltejs/adapter-node": 5.5.7
  "@sveltejs/kit": 2.69.1
  "@sveltejs/vite-plugin-svelte": 6.2.4
  "@tsconfig/strictest": 2.0.8
  "@tsconfig/svelte": 5.0.8
  eslint: 9.39.4
  "@eslint/js": 9.39.4
  eslint-config-prettier: 10.1.8
  eslint-plugin-svelte: 3.20.0
  globals: 16.5.0
  prettier: 3.9.4
  prettier-plugin-svelte: 3.5.2
  svelte: 5.56.4
  svelte-check: 4.7.1
  turbo: 2.10.3
