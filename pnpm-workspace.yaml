  "@sveltejs/vite-plugin-svelte": 6.2.4
  "@tsconfig/strictest": 2.0.8
  "@tsconfig/svelte": 5.0.8
  eslint: 9.39.4
  "@eslint/js": 9.39.4
  eslint-config-prettier: 10.1.8
  eslint-plugin-svelte: 3.20.0
  globals: 16.5.0
  prettier: 3.9.4
  prettier-plugin-svelte: 3.5.2
  svelte: 5.56.4
  svelte-check: 4.7.1
  turbo: 2.10.3
